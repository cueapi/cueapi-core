name: Argus QA Gate

on:
  workflow_run:
    workflows: ["Deploy to Staging"]
    types: [completed]

jobs:
  trigger-argus:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Create Argus test-cueapi-core cue
        run: |
          # Staging deploy succeeded - trigger Argus to test the staging environment
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://api.cueapi.ai/v1/cues \
            -H "Authorization: Bearer ${{ secrets.ARGUS_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "test-cueapi-core-${{ github.event.workflow_run.head_sha }}",
              "schedule": {
                "type": "once",
                "at": "'$(date -u -d '+10 seconds' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v+10S +%Y-%m-%dT%H:%M:%SZ)'"
              },
              "transport": "worker",
              "payload": {
                "task": "test-cueapi-core",
                "commit": "${{ github.event.workflow_run.head_sha }}",
                "repo": "cueapi-core",
                "branch": "main",
                "staging_url": "${{ secrets.CUEAPI_STAGING_URL }}"
              }
            }')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Response: $BODY"
          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "201" ]; then
            echo "Failed to create Argus cue: $HTTP_CODE"
            exit 1
          fi
          CUE_ID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Argus cue created: $CUE_ID"

      - name: Report
        run: echo "Argus will test cueapi-core staging at ${{ secrets.CUEAPI_STAGING_URL }}"
