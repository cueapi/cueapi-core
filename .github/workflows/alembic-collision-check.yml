name: alembic-collision-check

# Pre-merge check that scans every other open PR touching
# alembic/versions/** for a colliding ``revision = "..."`` declaration.
# Fails the check on collision so the author can renumber before
# merge. Designed to prevent the alembic-revision-collision class of
# outage that took down hosted cueapi for ~3h on 2026-05-09 (PRs
# #720 + #721 in private cueapi both claimed revision 056; both
# merged; alembic refused to apply head; auth path 500'd on every
# request).
#
# What's checked
# --------------
#
# For each migration file changed in this PR:
#
# 1. Parse the ``revision = "..."`` line
# 2. List every OTHER open PR in the same repo whose changed files
#    include ``alembic/versions/**``
# 3. For each, fetch the migration file content via the GitHub API
#    and parse its revision string
# 4. If any other open PR declares the SAME revision string, fail
#    with a clear message naming the colliding PR
#
# Why we don't check ``down_revision`` collisions: two PRs with the
# same down_revision but different revisions ALSO fork the chain,
# but that's a fundamentally different signal (it means two PRs are
# branching off the same parent, which CAN be intentional during
# hotfix cherry-picks). The revision-string collision is the
# unambiguous-bug case; check that first, document the
# down_revision case separately.
#
# Why GitHub Actions vs pre-commit hook: pre-commit only sees the
# author's local view; doesn't know about other open PRs. The
# revision number is "free" locally but already claimed by an open
# PR the author doesn't have checked out. The check has to run in
# CI with API access to enumerate open PRs.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'alembic/versions/**'

permissions:
  contents: read
  pull-requests: read

jobs:
  alembic-collision-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v6.0.0
        with:
          python-version: '3.12'

      - name: Detect revision collisions across open PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          import os
          import re
          import subprocess
          import sys

          REPO = os.environ["REPO"]
          PR_NUMBER = int(os.environ["PR_NUMBER"])
          BASE_SHA = os.environ["BASE_SHA"]
          HEAD_SHA = os.environ["HEAD_SHA"]

          REVISION_RE = re.compile(r'^\s*revision\s*[:=]\s*["\']([^"\']+)["\']', re.M)


          def gh(args: list[str]) -> str:
              """Run gh CLI with output capture; exit with detail on failure."""
              result = subprocess.run(
                  ["gh"] + args,
                  capture_output=True,
                  text=True,
              )
              if result.returncode != 0:
                  print(f"::error::gh {args} failed (rc={result.returncode}):", file=sys.stderr)
                  print(result.stderr, file=sys.stderr)
                  sys.exit(2)
              return result.stdout


          def parse_revision(text: str) -> str | None:
              """Return the revision string from a migration file, or None."""
              match = REVISION_RE.search(text)
              return match.group(1) if match else None


          # ─── Collect THIS PR's revisions ──────────────────────────
          diff_files = subprocess.run(
              ["git", "diff", "--name-only", BASE_SHA, HEAD_SHA],
              capture_output=True,
              text=True,
              check=True,
          ).stdout.splitlines()
          my_migrations = [
              f for f in diff_files
              if f.startswith("alembic/versions/") and f.endswith(".py")
          ]
          if not my_migrations:
              print("No alembic migrations changed in this PR. Nothing to check.")
              sys.exit(0)

          my_revisions: dict[str, str] = {}  # path → revision
          for path in my_migrations:
              try:
                  with open(path, encoding="utf-8") as f:
                      content = f.read()
              except FileNotFoundError:
                  # File was deleted in this PR; skip.
                  continue
              rev = parse_revision(content)
              if rev:
                  my_revisions[path] = rev

          if not my_revisions:
              print("Migration files changed but no revision strings found. Skipping.")
              sys.exit(0)

          print(f"This PR's migration revisions: {my_revisions}")

          # ─── Enumerate other open PRs that touch alembic/versions ──
          other_prs_json = gh([
              "pr", "list",
              "--repo", REPO,
              "--state", "open",
              "--json", "number,headRefOid,files",
              "--limit", "200",
          ])
          other_prs = json.loads(other_prs_json)

          collisions: list[tuple[int, str, str, str]] = []  # (pr#, their_path, their_rev, our_path)

          for pr in other_prs:
              if pr["number"] == PR_NUMBER:
                  continue
              their_alembic = [
                  f["path"]
                  for f in pr.get("files", [])
                  if f["path"].startswith("alembic/versions/")
                  and f["path"].endswith(".py")
              ]
              if not their_alembic:
                  continue
              their_sha = pr["headRefOid"]
              for path in their_alembic:
                  # Fetch file content at their PR head SHA via GitHub API.
                  try:
                      content_b = subprocess.run(
                          ["gh", "api", f"repos/{REPO}/contents/{path}", "-f", f"ref={their_sha}", "--jq", ".content"],
                          capture_output=True,
                          text=True,
                          check=True,
                      ).stdout.strip()
                      import base64
                      content = base64.b64decode(content_b).decode("utf-8", errors="replace")
                  except subprocess.CalledProcessError:
                      # File deleted in their PR or API hiccup; skip silently.
                      continue
                  rev = parse_revision(content)
                  if not rev:
                      continue
                  for our_path, our_rev in my_revisions.items():
                      if rev == our_rev:
                          collisions.append((pr["number"], path, rev, our_path))

          # ─── Report ───────────────────────────────────────────────
          if collisions:
              print()
              print("::error::Alembic revision collision detected.")
              print()
              print("This PR claims a revision number that another open PR also claims.")
              print("If both merge, alembic forks the migration chain and `upgrade head`")
              print("refuses to apply, breaking production on the next deploy.")
              print()
              print("Collisions:")
              for other_pr, their_path, rev, our_path in collisions:
                  print(f"  • {our_path} (this PR)  CONFLICTS WITH")
                  print(f"    {their_path} (PR #{other_pr})")
                  print(f"    on revision = '{rev}'")
              print()
              print("Fix: bump this PR's revision to the next free integer and update")
              print("down_revision to chain off the most recently merged migration.")
              print("Coordinate with the colliding PR's author on which one bumps.")
              sys.exit(1)

          print(f"No collisions across {len(other_prs) - 1} other open PR(s). Pass.")
          PY
